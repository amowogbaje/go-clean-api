version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: go_clean_db
    # Tell Postgres to use the .env file to set itself up
    env_file:
      - .env 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go_clean_api
    ports:
      - "8080:8080"
    # Tell your Go API to read from the exact same .env file
    env_file:
      - .env 
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads
    restart: on-failure

volumes:
  postgres_data: